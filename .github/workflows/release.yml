name: release
on:
  push:
    tags:
    - 'v*'
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout
      uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
    - name: Unshallow
      run: git fetch --prune --unshallow
    - name: Set up Go
      uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5.6.0
      with:
        go-version: '1.25.7'
    - name: Build
      run: |
        go mod tidy
        go build -o influxdbv2-database-plugin cmd/influxdbv2-database-plugin/main.go
    - name: Calculate SHA256 checksum
      run: |
        sha256sum influxdbv2-database-plugin | cut -d ' ' -f1 > influxdbv2-database-plugin.sha256
    - name: Create GitHub release
      uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2.6.2
      with:
        draft: false
        prerelease: false
        name: ${{ github.ref_name }}
        body: ${{ github.event.head_commit.message }}
        files: |
          influxdbv2-database-plugin
          influxdbv2-database-plugin.sha256
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
